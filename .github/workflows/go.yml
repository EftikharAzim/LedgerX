name: Go CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ledgerx_test
          POSTGRES_USER: ledgerx
          POSTGRES_PASSWORD: ledgerx
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ledgerx"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Tidy
        run: go mod tidy
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
      - name: Test (unit + integration)
        env:
          TEST_DATABASE_URL: postgres://ledgerx:ledgerx@localhost:5432/ledgerx_test?sslmode=disable
          TEST_REDIS_ADDR: localhost:6379
        run: go test ./... -race -count=1
