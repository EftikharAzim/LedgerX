services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ledgerx
      POSTGRES_USER: ledgerx
      POSTGRES_PASSWORD: ledgerx
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      {
        test: ["CMD-SHELL", "pg_isready -U ledgerx"],
        interval: 5s,
        timeout: 3s,
        retries: 10,
      }

  redis:
    image: redis:7
    ports: ["6379:6379"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redisdata:/data]

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file: ["../.env"]
    # Override the host-oriented .env defaults for the compose network:
    # APP_ENV=docker selects DATABASE_URL_DOCKER, and Redis is reached by
    # service name rather than localhost.
    environment:
      APP_ENV: docker
      REDIS_ADDR: redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    ports: ["8080:8080"]
    command: ["./ledgerx"]

volumes:
  pgdata:
  redisdata:
